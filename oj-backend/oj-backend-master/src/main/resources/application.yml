# 代码沙箱配置
codesandbox:
  type: docker
  docker:
    timeout: 10        # 执行超时（秒）
    memory: 256m       # 内存限制
    cpu: "1"           # CPU 限制


# JDoodle API Credentials（通过环境变量注入，备用）
jdoodle:
  client-id: ${JDOODLE_CLIENT_ID:}
  client-secret: ${JDOODLE_CLIENT_SECRET:}

# AI 聊天配置（Ollama）
ai:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:deepseek-r1:7b}