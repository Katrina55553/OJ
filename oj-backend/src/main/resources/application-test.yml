# 测试配置文件
server:
  port: 8101
spring:
  # 数据库配置（通过环境变量注入）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/my_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  # Redis 配置（Spring Boot 3 前缀为 spring.data.redis，通过环境变量注入）
  data:
    redis:
      database: 1
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 5000
      password: ${REDIS_PASSWORD:}
