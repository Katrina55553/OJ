# 线上配置文件
server:
  port: 8101
spring:
  # 数据库配置（通过环境变量注入）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/my_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  # Redis 配置（Spring Boot 3 前缀为 spring.data.redis，通过环境变量注入）
  data:
    redis:
      database: 1
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 5000
      password: ${REDIS_PASSWORD:}
mybatis-plus:
  configuration:
    # 生产环境关闭日志
    log-impl: ''
# 代码沙箱配置
# workDir：后端容器内路径，Java 用它创建临时目录/写代码文件（docker-compose 挂载 ./oj-backend/sandbox:/app/sandbox）
# hostWorkDir：宿主机绝对路径，docker run -v 挂载源必须用宿主机路径（后端容器通过 docker socket 调用宿主机 docker）
codesandbox:
  docker:
    workDir: /app/sandbox/tmp
    hostWorkDir: ${SANDBOX_HOST_DIR:}
