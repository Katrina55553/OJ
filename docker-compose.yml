services:
  # ========== MySQL ==========
  mysql:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/mysql:8.0
    container_name: oj-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: yuoj
      MYSQL_CHARSET: utf8mb4
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./oj-backend/sql/create_table.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - oj-network

  # ========== Redis ==========
  redis:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/redis:7-alpine
    container_name: oj-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - oj-network

  # ========== RabbitMQ ==========
  rabbitmq:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/rabbitmq:3-management
    container_name: oj-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # 管理界面
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - oj-network

  # ========== 后端 API ==========
  backend:
    build:
      context: ./oj-backend
      dockerfile: Dockerfile
    container_name: oj-backend
    restart: unless-stopped
    ports:
      - "8101:8101"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker Socket（代码沙箱需要）
      - ./oj-backend/sandbox:/app/sandbox  # 沙箱 Dockerfile
    environment:
      # 数据库
      DB_URL: jdbc:mysql://mysql:3306/yuoj?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      # Redis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-oj-default-secret-key-must-be-at-least-256-bits-long-for-hs256}
      # 代码沙箱（后端容器通过 docker socket 调用宿主机 docker，docker run -v 必须用宿主机绝对路径）
      # ${PWD} 由 docker compose 在宿主机上展开为执行目录（即 /home/ubuntu/oj）
      SANDBOX_HOST_DIR: ${PWD}/oj-backend/sandbox/tmp
      # Spring
      SPRING_PROFILES_ACTIVE: prod
    # JVM 内存限制
    entrypoint: ["java", "-Xms256m", "-Xmx512m", "-jar", "app.jar"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - oj-network

  # ========== 前端 ==========
  frontend:
    build:
      context: ./oj-frontend
      dockerfile: Dockerfile
    container_name: oj-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - oj-network

# 数据持久化
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local

# 网络
networks:
  oj-network:
    driver: bridge
